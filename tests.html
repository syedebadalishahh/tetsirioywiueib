<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CNIC Picture Search</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:30px;
      width:350px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:14px;
      font-size:18px;
      border:1px solid #ccc;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:14px;
      font-size:18px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    #status{
      margin-top:20px;
      font-size:16px;
      color:red;
    }

    img{
      margin-top:20px;
      width:250px;
      border-radius:10px;
      border:2px solid #ddd;
      display:none;
    }

  </style>

</head>
<body>

  <div class="box">

    <h1>CNIC Picture Search</h1>

    <input
      type="text"
      id="cnic"
      placeholder="Enter CNIC Number"
    >

    <button onclick="getPicture()">
      Search Picture
    </button>

    <div id="status"></div>

    <img id="photo">

  </div>

  <script>

    async function getPicture(){

      const cnic = document.getElementById("cnic").value;

      const status = document.getElementById("status");

      const photo = document.getElementById("photo");

      status.innerHTML = "Loading...";

      photo.style.display = "none";

      try{

        const response = await fetch(
          `https://traceverisys.com/api/lahorepic_TV.php?cnic=${cnic}`
        );

        const data = await response.json();

        console.log(data);

        /*
        API array return kar rahi hai
        */

        const user = data[0];

        if(user && user.image_base64){

          photo.src = user.image_base64;

          photo.style.display = "block";

          status.innerHTML = "Picture Found";

        } else {

          status.innerHTML = "No Picture Found";

        }

      } catch(error){

        console.log(error);

        status.innerHTML = "API Error";

      }

    }

  </script>

</body>
</html>
